# Railway config-as-code for the Conscience Os monorepo.
#
# Both the conscience-web (public-site) and internal-ops services share this
# repo. Railway reads this file at the repo root for any service that hasn't
# been pointed at a custom Config as Code path. The build + start commands
# branch on $RAILWAY_SERVICE_NAME so each service runs against its own app.
#
# Per-service tomls also exist at apps/public-site/railway.toml and
# apps/internal-ops/railway.toml — point a service at one of those via the
# dashboard when watch paths or service-specific deploy hooks are needed.

[build]
builder = "RAILPACK"
buildCommand = """
set -e
echo "Building service: $RAILWAY_SERVICE_NAME"
corepack enable
corepack prepare pnpm@10.33.3 --activate
pnpm install --frozen-lockfile
if [ "$RAILWAY_SERVICE_NAME" = "internal-ops" ]; then
  pnpm --filter internal-ops build
else
  pnpm --filter public-site build
fi
"""

[deploy]
startCommand = """
if [ "$RAILWAY_SERVICE_NAME" = "internal-ops" ]; then
  pnpm --filter internal-ops start
else
  pnpm --filter public-site start
fi
"""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
